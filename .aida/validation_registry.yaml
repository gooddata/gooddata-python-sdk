# AIDA validation registry
#
# Define command_id and processor_id specifications referenced by validation_policy.yaml.
version: 1
registry:
  includes: []
  commands:
    package-validate:
      argv:
      - bash
      - '{workspace_root}/scripts/validate_python.sh'
      - --project-path
      - '{workspace_root}/{root}'
      - --workspace-root
      - '{workspace_root}'
      - --scope
      - '{scope}'
      - --auto-fix
      - "true"
      cwd: '{workspace_root}'
      timeout_sec: 900
    package-validate-no-tests:
      argv:
      - bash
      - '{workspace_root}/scripts/validate_python.sh'
      - --project-path
      - '{workspace_root}/{root}'
      - --workspace-root
      - '{workspace_root}'
      - --scope
      - '{scope}'
      - --auto-fix
      - "true"
      - --steps-csv
      - format,lint,types
      cwd: '{workspace_root}'
      timeout_sec: 600
    api-client-tests:
      argv:
      - uv
      - run
      - tox
      - -c
      - '{workspace_root}/gooddata-api-client/tox.ini'
      cwd: '{workspace_root}/gooddata-api-client'
    aida-doctor:
      argv:
      - aida-mcp
      - doctor
      cwd: '{workspace_root}'
  processors: {}
