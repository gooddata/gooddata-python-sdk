# AIDA validation policy
#
# This file wires domains -> pipelines -> steps (command_id + processor_id).
version: 1
validation_policy:
  codegen:
  - id: api-client-regeneration-check
    match_globs:
    - schemas/**/*.json
    - .openapi-generator/**/*.yaml
    - scripts/generate_client.sh
    pipeline: api-client-fast
    scopes:
    - pre_push
  routes:
  - domain: python-package
    pipeline: package-fast
  - domain: api-client
    pipeline: api-client-fast
  - domain: repo-tooling
    pipeline: repo-fast
  - domain: aida-config
    pipeline: aida-config
  pipelines:
    package-fast:
      steps:
      - command_id: package-validate
        processor_id: external_json
    repo-fast:
      steps:
      - command_id: package-validate-no-tests
        processor_id: external_json
    api-client-fast:
      steps:
      - command_id: api-client-tests
        processor_id: pytest
    aida-config:
      steps:
      - command_id: aida-doctor
        processor_id: passthrough
