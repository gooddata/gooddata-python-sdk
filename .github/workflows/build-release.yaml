# For more information see: https://help.github.com/en/actions/language-and-framework-guides/using-python-with-github-actions#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Build Python Package and Create Release

# Dispatched by the Release workflow (bump-version.yaml) after it tags a release,
# so this always runs from master's definition (single source of truth) while
# building the tagged code. Can also be dispatched manually to re-run a release.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v1.2.3)'
        required: true
        type: string
      make_latest:
        description: 'Mark the GitHub release as latest (true/false)'
        required: false
        default: 'false'
        type: string

env:
  COMPONENTS: '["gooddata-api-client","gooddata-pandas","gooddata-fdw","gooddata-sdk","gooddata-dbt","gooddata-flight-server","gooddata-flexconnect","gooddata-pipelines","gooddata-eval"]'

jobs:
  matrix-components:
    name: Prepare matrix components
    runs-on: ubuntu-latest
    outputs:
      components: ${{ steps.export.outputs.components }}
    steps:
      - name: Export components JSON
        id: export
        run: echo "components=${COMPONENTS}" >> "$GITHUB_OUTPUT"

  build:
    name: Build all components
    needs: matrix-components
    permissions:
      contents: read
    strategy:
      matrix:
        component: ${{ fromJSON(needs.matrix-components.outputs.components) }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ inputs.tag }}
        persist-credentials: false
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Build ${{ matrix.component }}
      run: |
          if [ "${{ matrix.component }}" = "gooddata-api-client" ]; then
            cd ${{ matrix.component }}
          else
            cd packages/${{ matrix.component }}
          fi
          uv build --out-dir dist
    - name: Persist ${{ matrix.component }} artifacts
      uses: actions/upload-artifact@v6
      with:
        name: artifacts_${{ matrix.component }}
        path: |
          ${{ matrix.component == 'gooddata-api-client' && format('{0}/dist/', matrix.component) || format('packages/{0}/dist/', matrix.component) }}
        if-no-files-found: error
  github_release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          persist-credentials: false
      - name: Obtain artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist/
      - name: Generate changelog
        id: changelog
        uses: requarks/changelog-action@v1
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          tag: ${{ inputs.tag }}
          writeToFile: false
          includeRefIssues: false
          useGitmojis: false
      - name: Create GitHub release
        uses: "softprops/action-gh-release@v2"
        with:
          tag_name: ${{ inputs.tag }}
          body: ${{ steps.changelog.outputs.changes }}
          token: "${{ secrets.GITHUB_TOKEN }}"
          draft: false
          prerelease: false
          # accepts the strings "true"/"false"/"legacy"; the Release workflow
          # passes "true"/"false" from scripts/is_latest_tag.sh
          make_latest: ${{ inputs.make_latest }}
          files: |
            dist/**/*.whl
            dist/**/*.tar.gz
  publish:
    name: Publish components
    runs-on: ubuntu-latest
    needs:
      - matrix-components
      - build
    permissions:
      id-token: write
    strategy:
      matrix:
        component: ${{ fromJSON(needs.matrix-components.outputs.components) }}
    steps:
      - name: Obtain ${{ matrix.component }} artifacts
        uses: actions/download-artifact@v6
        with:
          name: artifacts_${{ matrix.component }}
          path: dist/${{ matrix.component }}
      - name: Push ${{ matrix.component}} to pypi
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/${{ matrix.component }}
          verbose: true
  slack-notification:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Notify to slack
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "#releases"
            text: "The release of *gooddata-python-sdk@${{ inputs.tag }}*, has been successful. :tada:"
