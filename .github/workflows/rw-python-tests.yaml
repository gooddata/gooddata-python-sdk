name: tests
on:
  workflow_call:
    inputs:
      changed-python-modules:
        type: string
        default: 'false'
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    if: ${{inputs.changed-python-modules == 'true'}}
    strategy:
      matrix:
        python_version: ['3.14', '3.13', '3.12', '3.11', '3.10']
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python_version }}
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python_version }}
      - name: Install dependencies
        run: uv sync --group test --locked
      - name: Run tests
        run: make test TEST_PYTHON=${{ matrix.python_version }}
      - name: Upload coverage to Codecov
        if: ${{ matrix.python_version == '3.14' }}
        uses: codecov/codecov-action@v5
        with:
          files: ./packages/gooddata-sdk/coverage.xml,./packages/gooddata-pandas/coverage.xml,./packages/gooddata-fdw/coverage.xml,./packages/gooddata-flight-server/coverage.xml,./packages/gooddata-flexconnect/coverage.xml,./packages/gooddata-dbt/coverage.xml,./packages/gooddata-pipelines/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          override_commit: ${{ github.event.pull_request.head.sha || github.sha }}
          override_pr: ${{ github.event.number }}
  lint-and-format-check:
    runs-on: ubuntu-latest
    if: ${{inputs.changed-python-modules == 'true'}}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up python 3.14
        uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.14
      - name: Install dependencies
        run: |
          uv sync --only-group lint --locked
      - name: pep8 and formatting check
        run: |
          make format
  docs-scripts-tests:
    runs-on: ubuntu-latest
    if: ${{inputs.changed-python-modules == 'true'}}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up python 3.14
        uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.14
      - name: Install dependencies
        run: |
          uv sync --group test --locked
      - name: Test docs scripts
        run: |
          make test-docs-scripts
  types-check:
    runs-on: ubuntu-latest
    if: ${{inputs.changed-python-modules == 'true'}}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up python 3.14
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: |
          uv sync --group type --locked
      - name: type check
        run: |
          make type-check
