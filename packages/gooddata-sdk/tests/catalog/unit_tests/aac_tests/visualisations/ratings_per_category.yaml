id: 4c2002a4-a60c-4f4a-a440-d2a6a35887cf
type: column_chart

title: Ratings per Category

query:
    fields:
        sum_of_rating:
            title: Sum of Rating
            aggregation: SUM
            using: fact/rating
        product_category: label/product_category
        product_rating: label/product_rating

metrics:
    - field: sum_of_rating
      format: "#,##0.00"

view_by:
    - product_category

segment_by:
    - product_rating

config:
    colors:
        "*": rgb(255,0,0)
        "**": rgb(255,159,0)
        "***": rgb(245,255,102)
        "****": rgb(102,255,235)
        "*****": rgb(23,242,13)
    legend_position: top
    xaxis_name_position: center
    xaxis_rotation: "0"
    yaxis_name_position: top
