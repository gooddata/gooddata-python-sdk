interactions:
  - request:
      body:
        sql: SELECT ol.campaign_id FROM order_lines ol LIMIT 0
      headers:
        Accept:
          - application/json
        Accept-Encoding:
          - br, gzip, deflate
        Content-Type:
          - application/json
        X-GDC-VALIDATE-RELATIONS:
          - 'true'
        X-Requested-With:
          - XMLHttpRequest
      method: POST
      uri: http://localhost:3000/api/v1/actions/dataSources/demo-test-ds/scanSql
    response:
      body:
        string:
          columns:
            - dataType: INT
              name: campaign_id
      headers:
        Content-Type:
          - application/json
        DATE: &id001
          - PLACEHOLDER
        Expires:
          - '0'
        Pragma:
          - no-cache
        X-Content-Type-Options:
          - nosniff
        X-GDC-TRACE-ID: *id001
      status:
        code: 200
        message: OK
version: 1
