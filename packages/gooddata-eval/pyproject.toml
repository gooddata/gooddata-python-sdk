# (C) 2026 GoodData Corporation
[project]
name = "gooddata-eval"
version = "1.68.0"
description = "Evaluate the GoodData AI agent against your own questions and models."
readme = "README.md"
license = "MIT"
authors = [
    {name = "GoodData", email = "support@gooddata.com"}
]
keywords = ["gooddata", "ai", "evaluation", "llm", "analytics", "cli"]
requires-python = ">=3.10"
dependencies = [
    "gooddata-sdk~=1.68.0",
    "httpx>=0.27,<1.0",
    "orjson>=3.9.15,<4.0.0",
    "pydantic>=2.6,<3.0",
    "rich>=13.0,<15.0",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering",
    "Topic :: Software Development",
    "Typing :: Typed",
]

[project.optional-dependencies]
llm-judge = ["openai>=1.40,<2.0", "python-dotenv>=1.0,<2.0"]

[project.scripts]
gd-eval = "gooddata_eval.cli.main:main"

[project.urls]
Source = "https://github.com/gooddata/gooddata-python-sdk"

[dependency-groups]
dev = [
    "pytest>=8.3.5",
]
test = [
    "pytest~=8.3.4",
    "pytest-cov~=6.0.0",
    "pytest-mock>=3.14.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/gooddata_eval"]

[tool.coverage.run]
source = ["gooddata_eval"]

[tool.coverage.paths]
source = [
    "src/gooddata_eval",
    "**/site-packages/gooddata_eval",
]

[tool.ty.analysis]
allowed-unresolved-imports = ["openai.**", "gooddata_api_client.**"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
